name: Build and Release FH6Auto

# 触发条件：当你推送一个带 "v" 开头的标签时（例如 v0.1.0）触发打包
on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: windows-latest  # 必须在 Windows 环境下打包

    steps:
    - name: 检出代码 (Checkout)
      uses: actions/checkout@v3

    - name: 配置 Python 环境
      uses: actions/setup-python@v4
      with:
        python-version: '3.11' # 推荐使用 3.11 打包，兼容性好

    - name: 安装依赖库
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: 自动同步 Git Tag 到 config.py
      shell: python
      run: |
        import re
        tag = '${{ github.ref_name }}'.replace('v', '')
        with open('config.py', 'r', encoding='utf-8') as f:
            content = f.read()
        new_content = re.sub(r'CURRENT_VERSION\s*=\s*[\'"].*?[\'"]', f'CURRENT_VERSION = "{tag}"', content)
        with open('config.py', 'w', encoding='utf-8') as f:
            f.write(new_content)
            
    - name: 执行打包脚本 (build.bat)
      run: |
        call build.bat
      shell: cmd

    - name: 发布到 GitHub Release
      uses: softprops/action-gh-release@v1
      with:
        files: dist/FH6Auto.exe
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}